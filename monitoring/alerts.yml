groups:
  - name: eap-backend
    rules:
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency above 2s for 10 minutes"

      - alert: BackendDown
        expr: up{job="eap-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend target is down"

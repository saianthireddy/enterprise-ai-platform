apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eap-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - app.enterprise-ai-platform.example.com
        - api.enterprise-ai-platform.example.com
      secretName: eap-tls
  rules:
    - host: app.enterprise-ai-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eap-frontend
                port:
                  number: 80
    - host: api.enterprise-ai-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eap-backend
                port:
                  number: 80
